name: 加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: UTC
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-gf4dc45704e54-abogki446052083-4k'
  CCACHE_KEY: ccache-neov4-6.6.89

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU,默认ReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: 'lz4 1.10.0+zstd 1.5.7'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'LZ4KD'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: 'BBR算法'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: '网络增强'
        required: true
        type: boolean
        default: 'false'
      adios_enable:
        description: 'ADIOS IO调度'
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: 'Re-Kernel'
        required: true
        type: boolean
        default: 'false'
      baseband_guard:
        description: '基带保护'
        required: true
        type: boolean
        default: 'true'
      ccache_update:
        description: '更新ccache'
        required: true
        type: boolean
        default: 'false'
      ccache_debug:
        description: 'ccache日志'
        required: true
        type: boolean
        default: 'false'
      kernel_suffix:
        description: '内核后缀'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 初始化环境
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-mark hold firefox libc-bin
          sudo apt purge man-db -y
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update
          sudo apt-get install -y binutils python-is-python3 libssl-dev libelf-dev ccache
          
          aria2c -s16 -x16 https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89 common
          rm common.zip
          
          mkdir -p clang18
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18
          rm clang.zip
          
          aria2c -s16 -x16 https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm build-tools.zip
          
          rm common/android/abi_gki_protected_exports_* 2>/dev/null
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 配置ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_6.6.89" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          df -h

      - name: 载入ccache缓存
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-main
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-

      - name: 清理旧缓存
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-main -R ${{ github.repository }} 2>/dev/null || true

      - name: 初始化ccache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="3G"
          mkdir -p "$CCACHE_DIR"
          ccache -M 3G
          ccache -o compression=true
          ccache -s

      - name: 添加KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            curl -LSs https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin
            cd KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            KSU_API_VERSION=$(curl -s https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild | grep -m1 "KSU_VERSION_API :=" | awk -F= '{print $2}' | tr -d '[:space:]' || echo 3.1.7)
            KSUVER=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            curl -LSs https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> common/arch/arm64/configs/gki_defconfig
            cd KernelSU
            KSUVER=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            curl -LSs https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh | bash -s dev-susfs
            KSUVER=114514
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -s main
            KSUVER=114514
          else
            KSUVER=0
          fi
          echo "ksuver=$KSUVER" >> $GITHUB_OUTPUT

      - name: 应用SUSFS
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch common/
            cp -r susfs4ksu/kernel_patches/fs/. common/fs/
            cp -r susfs4ksu/kernel_patches/include/linux/. common/include/linux/
            cd common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch 2>/dev/null || true
          fi

      - name: 应用lz4/zstd
        if: inputs.lz4_enable
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME src
          cp src/zram_patch/001-lz4.patch src/zram_patch/lz4armv8.S src/zram_patch/002-zstd.patch common/
          cd common
          git apply 001-lz4.patch 2>/dev/null || true
          patch -p1 < 002-zstd.patch 2>/dev/null || true

      - name: 配置内核选项
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_HEADERS_INSTALL=n" >> common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' common/build.config.gki

      - name: 构建内核（伪装时间）
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          cd kernel_workspace/common

          export FAKESTAT="2025-09-19 06:13:40"
          export FAKETIME="@2025-09-19 06:13:40"
          export TZ=UTC
          SO_DIR=$(pwd)

          cat > cc-wrapper <<EOF
          #!/bin/bash
          export LD_PRELOAD="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          ccache clang "\$@"
          EOF
          cat > ld-wrapper <<EOF
          #!/bin/bash
          export LD_PRELOAD="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          export FAKESTAT="$FAKESTAT"
          export FAKETIME="$FAKETIME"
          ld.lld "\$@"
          EOF
          chmod +x cc-wrapper ld-wrapper

          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" O=out gki_defconfig
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="./cc-wrapper" LD="./ld-wrapper" O=out Image

      - name: 保存缓存
        if: inputs.ccache_update || steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-main

      - name: 打包AnyKernel3
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf AnyKernel3/.git
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          KSU_TYPENAME=${{ github.event.inputs.ksu_type }}
          AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ steps.ksu_version.outputs.ksuver }}_6.6.89_A15_android15-8-gf4dc45704e54-abogki446052083-4k.zip
          zip -r ../$AK3_NAME .
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: 上传内核
        uses: actions/upload-artifact@v7
        with:
          path: kernel_workspace/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - name: 发布
        uses: softprops/gh-release@v1
        with:
          tag_name: build-$(date -u +%Y%m%d%H%M%S)
          name: 6.6.89 伪装版内核
          body: "编译时间：Fri Sep 19 06:13:40 UTC 2025"
          draft: false
          files: "*.zip"
